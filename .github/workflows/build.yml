name: Build ZenBoost

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build-arm64:
    name: arm64-v8a
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK r27b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          add-to-path: true

      - name: Configure CMake (arm64-v8a)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -B build/arm64 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build (arm64-v8a)
        run: cmake --build build/arm64 --parallel $(nproc)

      - name: Collect .so
        run: |
          mkdir -p dist
          find build/arm64 -name "libZenBoost.so" -exec cp {} dist/libZenBoost-arm64-v8a.so \;
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZenBoost-arm64-v8a
          path: dist/libZenBoost-arm64-v8a.so
          if-no-files-found: error

  build-armv7:
    name: armeabi-v7a
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK r27b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          add-to-path: true

      - name: Configure CMake (armeabi-v7a)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -B build/armv7 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build (armeabi-v7a)
        run: cmake --build build/armv7 --parallel $(nproc)

      - name: Collect .so
        run: |
          mkdir -p dist
          find build/armv7 -name "libZenBoost.so" -exec cp {} dist/libZenBoost-armeabi-v7a.so \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZenBoost-armeabi-v7a
          path: dist/libZenBoost-armeabi-v7a.so
          if-no-files-found: error